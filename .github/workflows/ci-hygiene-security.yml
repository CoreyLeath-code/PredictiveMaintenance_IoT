name: Tiers 1-3 - Core CI Gates

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:
  hygiene-and-test:
    name: Code Hygiene & Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Base Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi


      - name: Run Mypy (Strict Type Checking)
        run: |
          # Ensures sensor data streams conform precisely to expected numerical schemas
          mypy --ignore-missing-imports src/

      # Tier 2: Automated Unit & Integration Testing
      - name: Execute Test Suite with Coverage
        run: |
          pytest --cov=src/ --cov-report=xml --cov-fail-under=75 tests/

  security-scan:
    name: Security & Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Tier 3: Security & Vulnerability Scanning
      - name: Run Bandit (SAST Scanning)
        run: |
          pip install bandit
          bandit -r src/ -ll

      - name: Run Gitleaks (Secret Detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy (Dependency Vulnerability Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1' # Fails the build if high/critical vulnerabilities exist
          severity: 'HIGH,CRITICAL'
